<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDXSY Screener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #0B0F14;
  --surface: #12181F;
  --surface-raised: #182029;
  --border: #232C37;
  --text: #E7EDF3;
  --text-muted: #8A97A6;
  --accent-halal: #2ED3A3;
  --accent-amber: #F0A937;
  --accent-red: #E5484D;
  --accent-neutral: #5B6572;

  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
}

.topbar__brand {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.topbar__mark--accent { color: var(--accent-halal); }
.pagination-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 20px 0 8px;
}
.pagination-controls[hidden] { display: none; }
.pagination-info { font-size: 13px; color: var(--text-muted, #888); }

.topbar__actions { display: flex; gap: 10px; }

.btn {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  padding: 9px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn--ghost {
  background: transparent;
  color: var(--text);
}
.btn--ghost:hover { border-color: var(--accent-halal); }
.btn--primary {
  background: var(--accent-halal);
  color: #06231A;
  border-color: var(--accent-halal);
}
.btn--primary:hover { background: #35e3b2; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.layout {
  padding: 24px 28px;
}

.signals-panel__toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.signals-panel__title {
  font-family: var(--font-display);
  font-size: 18px;
  margin: 0;
}
.filter-group { display: flex; gap: 6px; }
.filter-chip {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
}
.filter-chip--active {
  background: var(--surface-raised);
  color: var(--text);
  border-color: var(--accent-halal);
}

/* Mobile: topbar & filter toggle kegedean di layar kecil - perkecil padding/font,
   dan biarkan topbar wrap ke baris baru kalau nggak muat daripada numpuk/kepotong. */
@media (max-width: 600px) {
  .topbar {
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 16px;
  }
  .topbar__brand { font-size: 16px; }
  .topbar__actions { gap: 6px; flex-wrap: wrap; }
  .btn {
    font-size: 11px;
    padding: 6px 10px;
  }
  .layout { padding: 16px; }
  .signals-panel__toolbar {
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-chip {
    font-size: 11px;
    padding: 5px 10px;
  }
}
.signals-panel__count { color: var(--text-muted); font-size: 12px; }
.sync-status {
  font-size: 12px;
  color: var(--text-muted);
  margin: 0 0 12px;
}

.signals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 16px 16px 20px;
  overflow: hidden;
}
/* Signature element: left-edge bar mengkodekan sinyal bandarmology (buy/sell/neutral) —
   sekilas pandang, warna kiri kartu langsung kasih tahu arah smart money tanpa baca teks. */
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--bar-color, var(--accent-neutral));
}

.card__head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.card__ticker {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card__ticker-link {
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px dashed var(--text-muted);
}
.card__ticker-link:hover {
  color: var(--accent-halal);
  border-bottom-color: var(--accent-halal);
}
.badge-halal {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  background: rgba(46, 211, 163, 0.15);
  color: var(--accent-halal);
}
.badge-nonhalal {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  background: rgba(229, 72, 77, 0.15);
  color: var(--accent-red);
}
.card__confidence {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  text-align: right;
}
.card__meta {
  text-align: right;
}
.card__timestamp {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

.card__prices {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
  font-family: var(--font-mono);
}
.price-block__label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.price-block__value { font-size: 14px; font-weight: 600; }
.price-block__pct { font-size: 11px; }
.pct-pos { color: var(--accent-halal); }
.pct-neg { color: var(--accent-red); }

.card__bandar {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  padding-top: 10px;
  margin-bottom: 10px;
}

.card__toggle {
  font-size: 12px;
  color: var(--accent-halal);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  font-family: var(--font-body);
  font-weight: 600;
}

.card__detail {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  display: grid;
  gap: 6px;
}
.card__detail[hidden] { display: none; }
.card__detail dt { color: var(--text); font-weight: 600; display: inline; }

.empty-state {
  color: var(--text-muted);
  text-align: center;
  padding: 60px 0;
  font-size: 14px;
}

.modal {
  position: fixed; inset: 0;
  background: rgba(4, 7, 10, 0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 20;
}
/* PENTING: [hidden] attribute secara default punya display:none dari browser,
   tapi aturan .modal { display:flex } di atas ini menang karena class selector
   lebih spesifik daripada attribute selector bawaan browser. Tanpa baris di
   bawah ini, modal.hidden = true di JS TIDAK akan menyembunyikan modal. */
.modal[hidden] {
  display: none;
}
.modal__card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  width: 420px;
  max-width: 92vw;
  max-height: 88vh;
  overflow-y: auto;
}
.modal__card--wide { width: 560px; }
.modal__head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.modal__head h2 { margin: 0; font-family: var(--font-display); font-size: 18px; }
.modal__close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  padding: 4px;
}
.modal__close:hover { color: var(--text); }
.modal__hint { color: var(--text-muted); font-size: 12px; margin: 4px 0 10px; }
.modal__textarea {
  width: 100%;
  min-height: 160px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px;
}
.modal__textarea--tall { min-height: 260px; font-size: 12px; }
.modal__row { display: flex; gap: 10px; margin-top: 12px; }
.modal__status { display: block; margin-top: 8px; font-size: 12px; color: var(--text-muted); }

.parse-result {
  margin-top: 14px;
  display: grid;
  gap: 6px;
  font-size: 13px;
}
.parse-result__item {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: 8px;
  background: var(--surface-raised);
}
.parse-result__ticker { font-family: var(--font-mono); font-weight: 700; }

/* --- Auth screen (login/signup) --- */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
/* Bug yang sama kayak .modal dulu: [hidden] browser defaultnya display:none,
   tapi class .auth-screen { display:flex } di atas ini menang karena class
   selector lebih spesifik. Tanpa baris ini, authScreen.hidden = true di JS
   TIDAK menyembunyikan layar login walau appRoot udah ditampilkan. */
.auth-screen[hidden] {
  display: none;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  width: 360px;
  max-width: 92vw;
}
.auth-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.auth-tab {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
}
.auth-tab.active {
  background: var(--surface-raised);
  color: var(--text);
  border-color: var(--accent-halal);
}
.auth-input {
  width: 100%;
  margin-bottom: 10px;
  min-height: unset;
}
.auth-msg {
  display: block;
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}
.auth-msg.err { color: var(--accent-red); }
.auth-msg.ok { color: var(--accent-halal); }
.auth-link {
  display: block;
  width: 100%;
  margin-top: 10px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  text-align: center;
}
.auth-link:hover { color: var(--accent-halal); }

  </style>
</head>
<body>
  <!-- Layar login/signup - tampil kalau belum ada sesi Supabase Auth -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="topbar__brand" style="margin-bottom: 18px;">
        <span class="topbar__mark topbar__mark--accent">IDXSY</span><span class="topbar__mark"> Screener</span>
      </div>

      <div id="authFormNormal">
        <div class="auth-tabs">
          <button id="tabLogin" class="auth-tab active">Masuk</button>

  <script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ---------- 1. SUPABASE CLIENT (auth + sync dari Web Signal) ----------
// Supabase client wrapper - satu titik pusat buat semua interaksi ke database.
// Input sinyal SEPENUHNYA lewat "Web Signal" (app terpisah yang sudah jalan),
// yang nulis ke tabel trades_data (1 JSON blob per user). App ini (IDX ISSI
// Screener) cuma BACA dari situ, transform ke tabel relasional (signals/
// confirmations/market_regime) biar bisa di-filter halal & dianalisis pakai
// SQL, lalu ditampilkan. Sync idempotent pakai msg_id sebagai kunci unik -
// aman dipanggil berkali-kali (upsert, bukan insert), jadi bisa otomatis
// jalan tiap kali app dibuka tanpa risiko data dobel.


const SUPABASE_URL = 'https://gfxhtpqzebxycijdnpjp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_BXkSOULyV06I6N6DhIIAdw_TJXQUGOS';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- Auth ---
async function getSession() {
  const { data: { session } } = await sb.auth.getSession();
  return session;
}

async function signIn(email, password) {
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
}

async function signUp(email, password) {
  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: { emailRedirectTo: window.location.origin },
  });
  if (error) throw error;
  return data;
}

async function signOut() {
  await sb.auth.signOut();
}

async function resetPasswordForEmail(email) {
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin,
  });
  if (error) throw error;
}

async function updatePassword(newPassword) {
  const { error } = await sb.auth.updateUser({ password: newPassword });
  if (error) throw error;
}

function onAuthStateChange(callback) {
  sb.auth.onAuthStateChange((event, session) => callback(event, session));
}

// --- ISSI list (fitur khusus IDX ISSI Screener, tidak ada di Web Signal) ---
async function getIssiTickers() {
  const { data, error } = await sb.from('issi_list').select('ticker');
  if (error) throw error;
  return (data || []).map((r) => r.ticker);
}

async function setIssiTickers(tickers) {
  const session = await getSession();
  if (!session) throw new Error('Belum login');
  const userId = session.user.id;

  const { error: delErr } = await sb.from('issi_list').delete().eq('user_id', userId);
  if (delErr) throw delErr;

  if (tickers.length === 0) return [];
  const rows = tickers.map((ticker) => ({ ticker, user_id: userId }));
  const { data, error } = await sb.from('issi_list').insert(rows).select('ticker');
  if (error) throw error;
  return (data || []).map((r) => r.ticker);
}

// --- Baca tabel hasil sync (dipakai buat render grid) ---
async function listSignals(max = 200) {
  const { data, error } = await sb
    .from('signals')
    .select('*')
    .order('signal_timestamp', { ascending: false })
    .limit(max);
  if (error) throw error;
  return data || [];
}

async function listConfirmations(max = 200) {
  const { data, error } = await sb
    .from('confirmations')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(max);
  if (error) throw error;
  return data || [];
}

async function listMarketRegime(max = 60) {
  const { data, error } = await sb
    .from('market_regime')
    .select('*')
    .order('date', { ascending: false })
    .limit(max);
  if (error) throw error;
  return data || [];
}

// ============================================================
// CACHE LOKAL (IndexedDB) - hindari sync+query ulang tiap kali app
// dibuka/direfresh kalau data di cloud belum berubah. Pola ini disamakan
// dengan app "Web Signal" (sumber data trades_data): simpan hasil signals
// + timestamp trades_data.updated_at yang terakhir dipakai, lalu pas
// load berikutnya cek dulu updated_at cloud (query kecil) - kalau belum
// berubah, langsung pakai cache lokal tanpa upsert/read besar ke tabel
// signals/confirmations/market_regime.
// ============================================================
const DB_NAME = 'issi_screener_db';
const STORE_NAME = 'state';
const STATE_KEY = 'current';

function openDB() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error('IndexedDB tidak didukung browser ini')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(STORE_NAME); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveSignalsToDB(signals, sourceUpdatedAt, counts = {}) {
  try {
    const db = await openDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put({ signals, sourceUpdatedAt, counts }, STATE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (err) {
    console.warn('Gagal menyimpan cache lokal:', err);
  }
}

async function loadSignalsFromDB() {
  try {
    const db = await openDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(STATE_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch (err) {
    console.warn('Gagal membaca cache lokal:', err);
    return null;
  }
}

// ============================================================
// SYNC OTOMATIS dari trades_data (Web Signal) - lihat field mapping
// dari fungsi parseSignal/parseResult/parseRegime di Web Signal.
// ============================================================

function protoSignalToRow(s, userId, issiSet) {
  return {
    user_id: userId,
    msg_id: s.msg_id ?? null,
    ticker: s.symbol,
    signal_type: s.signal_type,
    source_format: s.bot_version || null,
    signal_timestamp: s.date ? new Date(s.date).toISOString() : null,
    entry_price: s.entry_price ?? null,
    tp1_price: s.take_profit ?? null,
    tp1_pct: null, // tidak ada di data Web Signal untuk format sinyal ini
    tp2_price: s.target2_price ?? null,
    tp2_pct: null,
    sl_default_price: s.stop_loss ?? null,
    sl_default_pct: null,
    sl_moderat_price: null,
    sl_konservatif_price: null,
    confidence_score: null, // format sinyal ini belum ada Confidence Score
    confidence_label: null,
    is_halal: s.symbol ? issiSet.has(String(s.symbol).toUpperCase()) : false,
    detail: {
      technical: {
        macd: s.macd != null ? { value: s.macd, signal: s.macd_signal_val, status: s.macd_trend } : null,
        rsi: s.rsi != null ? { value: s.rsi, status: s.rsi_label } : null,
        ema: s.ema20 != null ? { ema20: s.ema20, ema50: s.ema50, status: s.ema_trend } : null,
        vwap: s.vwap != null ? { value: s.vwap, status: s.vwap_position } : null,
        adx: s.adx != null ? { value: s.adx, status: s.adx_label } : null,
        bb: s.bb_lower != null ? { lower: s.bb_lower, upper: s.bb_upper } : null,
        atr: s.atr ?? null,
      },
      pattern: { chart: s.chart_pattern || null, candle: s.candle_pattern || null },
      bandarmology: {
        // top_buyer/seller di Web Signal berupa string siap-tampil, bukan object terpisah
        sinyalBandar: s.bandar_signal ? { label: s.bandar_signal } : null,
        smartMoneyNet: s.smart_money_net || null,
        topBuyer: [s.top_buyer_1, s.top_buyer_2, s.top_buyer_3].filter(Boolean),
        topSeller: [s.top_seller_1, s.top_seller_2, s.top_seller_3].filter(Boolean),
      },
      // Foreign flow (asing) - khusus data Web Signal, tidak ada di format sinyal lain
      foreignFlow: s.foreign_status ? {
        status: s.foreign_status,
        netAsing: s.net_asing || null,
        netAsingLot: s.net_asing_lot ?? null,
        buyLot: s.foreign_buy_lot ?? null,
        sellLot: s.foreign_sell_lot ?? null,
        partisipasiPct: s.partisipasi_asing_pct ?? null,
      } : null,
      betaVolatilitas: null, // tidak ada di format sinyal ini
      analystOpinion: s.analyst_opinion || null,
      news: [],
      confidenceReasons: s.confidence_reasons ? [{ reason: s.confidence_reasons }] : [],
      marketWarning: s.market_warning || null,
    },
    raw_text: s.raw_text || null,
  };
}

// "trades" adalah array yang lebih baru/lengkap dari Web Signal (format v4:
// ada Confidence Score, SL 3-tier, TP1/SL dengan %, dan berita) - beda dari
// array "signals" yang formatnya lebih lama/sederhana. Konstruksi mirip
// protoSignalToRow, tapi field-field yang di sini "signals" nggak punya.
function protoTradeToRow(t, userId, issiSet) {
  const row = protoSignalToRow(t, userId, issiSet);
  return {
    ...row,
    tp1_pct: t.take_profit_pct ?? null,
    sl_default_pct: t.stop_loss_pct ?? null,
    sl_moderat_price: t.sl_moderat ?? null,
    sl_konservatif_price: t.sl_konservatif ?? null,
    confidence_score: t.confidence_score ?? null,
    confidence_label: t.confidence_label ?? null,
    detail: {
      ...row.detail,
      // confidence_reasons di "trades" berupa 1 string gabungan (dipisah ";"),
      // beda dari format lain yang sudah array of {reason}. Dipecah biar konsisten.
      confidenceReasons: t.confidence_reasons
        ? String(t.confidence_reasons).split(';').map((s) => ({ reason: s.trim() })).filter((r) => r.reason)
        : [],
      news: [t.news_1, t.news_2, t.news_3, t.news_4, t.news_5].filter(Boolean),
    },
  };
}

const CONFIRMATION_TYPE_MAP = { TP_HIT: 'tp_hit', PROFIT_LOCKED: 'closed', PROFIT_RUNNING: 'ongoing' };

function protoResultToRow(r, userId) {
  const entry = r.entry ?? null;
  const dayHigh = r.day_high ?? null;
  const peakPct = entry && dayHigh ? `${(((dayHigh - entry) / entry) * 100).toFixed(1)}%` : null;

  return {
    user_id: userId,
    msg_id: r.msg_id ?? null,
    signal_id: null, // di-isi lewat matching setelah semua signal ke-upsert
    ticker: r.symbol,
    confirmation_type: CONFIRMATION_TYPE_MAP[r.type] || r.type,
    status: r.status_text || null,
    call_watchlist_timestamp: null, // Web Signal tidak menyertakan field ini
    durasi: null,
    entry_price: entry,
    exit_price: r.exit_price ?? null,
    profit_pct: r.profit_pct || null,
    peak_price: dayHigh,
    peak_pct: peakPct,
    raw_text: r.raw_text || null,
    // PENTING: pakai timestamp kejadian asli (kapan TP/SL beneran ke-hit),
    // bukan biarkan default now() - kalau dibiarkan default, urutan histori
    // bakal salah total (keurutan berdasar jam sync, bukan jam kejadian).
    _eventTimestamp: r.date ? new Date(r.date).toISOString() : null,
  };
}

function protoRegimeToRow(reg, userId) {
  if (!reg.date) return null;
  return {
    date: new Date(reg.date).toISOString().slice(0, 10),
    user_id: userId,
    prediction: reg.prediction || null,
    score: reg.score ?? null,
    strength_emoji: null,
    // Web Signal tidak memecah index scoring/wall street/komoditas jadi field
    // terpisah - semuanya digabung jadi 1 string "components". Disimpan apa
    // adanya di sini (bukan di-parse ulang jadi array), karena sudah berupa
    // ringkasan siap-tampil.
    index_scoring: reg.components ? { raw: reg.components } : null,
    wall_street: null,
    komoditas: null,
    suspended: [],
    uma: [],
    summary: reg.commentary || null,
    raw_text: reg.raw_text || null,
  };
}

/**
 * Sync dari trades_data.payload ke tabel signals/confirmations/market_regime.
 * IDEMPOTENT - pakai upsert dengan onConflict msg_id (atau date buat regime),
 * jadi aman dipanggil berkali-kali (misal tiap app dibuka) tanpa bikin dobel.
 * Cukup 1 read (trades_data) + beberapa upsert - hemat, aman buat free tier.
 */
async function syncFromWebSignal() {
  const session = await getSession();
  if (!session) throw new Error('Belum login');
  const userId = session.user.id;

  const { data: protoRow, error: fetchErr } = await sb
    .from('trades_data')
    .select('payload')
    .eq('user_id', userId)
    .maybeSingle();
  if (fetchErr) throw fetchErr;
  if (!protoRow || !protoRow.payload) {
    return { signals: 0, confirmations: 0, regimes: 0, skipped: true };
  }

  const payload = protoRow.payload;
  const issiTickers = await getIssiTickers();
  const issiSet = new Set(issiTickers.map((t) => t.toUpperCase()));

  const signalRows = (payload.signals || []).map((s) => protoSignalToRow(s, userId, issiSet));
  const tradeRows = (payload.trades || []).map((t) => protoTradeToRow(t, userId, issiSet));
  const resultRows = (payload.results || []).map((r) => protoResultToRow(r, userId));
  const regimeRows = (payload.regimes || []).map((r) => protoRegimeToRow(r, userId)).filter(Boolean);

  const summary = { signals: 0, confirmations: 0, regimes: 0, skipped: false };

  // PENTING: Postgres upsert akan ERROR ("cannot affect row a second time")
  // kalau ada msg_id yang sama muncul 2x dalam satu batch upsert. Karena
  // "signals" dan "trades" bisa jadi overlap (msg_id yang sama tercatat di
  // keduanya), harus di-dedupe dulu di JS sebelum dikirim - bukan cuma
  // digabung mentah. "trades" (data lebih lengkap) menang kalau ada overlap.
  const byMsgId = new Map();
  for (const row of signalRows) {
    byMsgId.set(row.msg_id ?? Symbol(), row);
  }
  for (const row of tradeRows) {
    byMsgId.set(row.msg_id ?? Symbol(), row); // overwrite kalau msg_id sama
  }
  const allSignalRows = [...byMsgId.values()];

  let upsertedSignals = [];
  if (allSignalRows.length) {
    const { data, error } = await sb
      .from('signals')
      .upsert(allSignalRows, { onConflict: 'msg_id,user_id', ignoreDuplicates: false })
      .select('id, ticker, signal_timestamp, msg_id');
    if (error) throw error;
    upsertedSignals = data || [];
    summary.signals = upsertedSignals.length;
  }

  if (resultRows.length) {
    // Cari signal_id yang cocok: ticker sama DAN signal_timestamp <= waktu
    // kejadian confirmation ini (bukan asal ambil sinyal terbaru untuk ticker
    // itu - itu bisa salah kalau ada sinyal baru untuk ticker yang sama yang
    // justru muncul SETELAH confirmation ini terjadi).
    for (const row of resultRows) {
      if (!row.ticker) continue;
      const eventTime = row._eventTimestamp ? new Date(row._eventTimestamp) : null;
      const candidates = upsertedSignals
        .filter((s) => {
          if (s.ticker !== row.ticker || !s.signal_timestamp) return false;
          if (!eventTime) return true; // kalau confirmation tidak ada timestamp, tidak bisa filter waktu
          return new Date(s.signal_timestamp) <= eventTime;
        })
        .sort((a, b) => new Date(b.signal_timestamp) - new Date(a.signal_timestamp));
      row.signal_id = candidates.length ? candidates[0].id : null;
      // Pindahkan _eventTimestamp jadi created_at eksplisit (bukan biarkan
      // default now()), lalu buang field internal ini sebelum dikirim ke DB.
      if (row._eventTimestamp) row.created_at = row._eventTimestamp;
      delete row._eventTimestamp;
    }
    const { data, error } = await sb
      .from('confirmations')
      .upsert(resultRows, { onConflict: 'msg_id,user_id', ignoreDuplicates: false })
      .select();
    if (error) throw error;
    summary.confirmations = (data || []).length;
  }

  if (regimeRows.length) {
    const { data, error } = await sb
      .from('market_regime')
      .upsert(regimeRows, { onConflict: 'date,user_id' })
      .select();
    if (error) throw error;
    summary.regimes = (data || []).length;
  }

  return summary;
}

let authMode = 'login';

function showAuthMode(mode) {
  els.authFormNormal.hidden = mode !== 'normal';
  els.authFormForgot.hidden = mode !== 'forgot';
  els.authFormRecovery.hidden = mode !== 'recovery';
  els.authMsg.textContent = '';
  els.authMsg.className = 'auth-msg';
}

els.btnForgotPassword.addEventListener('click', () => {
  els.forgotEmail.value = els.authEmail.value;
  showAuthMode('forgot');
});
els.btnBackToLogin.addEventListener('click', () => showAuthMode('normal'));

els.btnSendReset.addEventListener('click', async () => {
  const email = els.forgotEmail.value.trim();
  if (!email) return;
  els.btnSendReset.disabled = true;
  try {
    await resetPasswordForEmail(email);
    els.authMsg.textContent = 'Link reset password dikirim, cek email kamu.';
    els.authMsg.className = 'auth-msg ok';
  } catch (err) {
    els.authMsg.textContent = err.message || 'Gagal mengirim, coba lagi.';
    els.authMsg.className = 'auth-msg err';
  } finally {
    els.btnSendReset.disabled = false;
  }
});

els.btnSetNewPassword.addEventListener('click', async () => {
  const newPass = els.newPassword.value;
  if (!newPass || newPass.length < 6) {
    els.authMsg.textContent = 'Password minimal 6 karakter.';
    els.authMsg.className = 'auth-msg err';
    return;
  }
  els.btnSetNewPassword.disabled = true;
  try {
    await updatePassword(newPass);
    els.authMsg.textContent = 'Password berhasil diganti. Masuk ke aplikasi...';
    els.authMsg.className = 'auth-msg ok';
    setTimeout(() => enterApp(), 1000);
  } catch (err) {
    els.authMsg.textContent = err.message || 'Gagal mengganti password.';
    els.authMsg.className = 'auth-msg err';
  } finally {
    els.btnSetNewPassword.disabled = false;
  }
});

onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    els.authScreen.hidden = false;
    els.appRoot.hidden = true;
    showAuthMode('recovery');
  }
});

function switchAuthTab(mode) {
  authMode = mode;
  els.tabLogin.classList.toggle('active', mode === 'login');
  els.tabSignup.classList.toggle('active', mode === 'signup');
  els.authSubmitBtn.textContent = mode === 'login' ? 'Masuk' : 'Daftar';
  els.authMsg.textContent = '';
  els.authMsg.className = 'auth-msg';
}
els.tabLogin.addEventListener('click', () => switchAuthTab('login'));
els.tabSignup.addEventListener('click', () => switchAuthTab('signup'));

els.authSubmitBtn.addEventListener('click', async () => {
  const email = els.authEmail.value.trim();
  const password = els.authPassword.value;
  els.authMsg.className = 'auth-msg';
  els.authMsg.textContent = '';
  if (!email || !password) {
    els.authMsg.textContent = 'Isi email dan password dulu.';
    els.authMsg.className = 'auth-msg err';
    return;
  }
  els.authSubmitBtn.disabled = true;
  try {
    if (authMode === 'login') {
      await signIn(email, password);
      await enterApp();
    } else {
      const data = await signUp(email, password);
      if (data.session) {
        await enterApp();
      } else {
        els.authMsg.textContent = 'Akun dibuat. Cek email untuk verifikasi, lalu login.';
        els.authMsg.className = 'auth-msg ok';
        switchAuthTab('login');
      }
    }
  } catch (err) {
    els.authMsg.textContent = err.message || 'Gagal, coba lagi.';
    els.authMsg.className = 'auth-msg err';
  } finally {
    els.authSubmitBtn.disabled = false;
  }
});

els.btnLogout.addEventListener('click', async () => {
  await signOut();
  els.appRoot.hidden = true;
  els.authScreen.hidden = false;
});

async function enterApp() {
  els.authScreen.hidden = true;
  els.appRoot.hidden = false;
  await syncAndLoad();
}

(async function init() {
  const session = await getSession();
  if (session) {
    await enterApp();
  } else {
    els.authScreen.hidden = false;
  }
})();

// SYNC + RENDER SIGNALS GRID
// ============================================================
function formatRupiah(n) {
  if (n === null || n === undefined) return '-';
  return 'Rp' + Number(n).toLocaleString('id-ID');
}
function pctClass(pct) {
  if (!pct) return '';
  return String(pct).trim().startsWith('-') ? 'pct-neg' : 'pct-pos';
}
function formatTimestamp(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('id-ID', {
    timeZone: 'Asia/Makassar', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit',
  }) + ' WITA';
}
function bandarColor(bandarmology) {
  const label = bandarmology?.sinyalBandar?.label?.toUpperCase();
  if (label === 'BUY') return 'var(--accent-halal)';
  if (label === 'SELL') return 'var(--accent-red)';
  return 'var(--accent-neutral)';
}

// --- Lampu indikator (emoji) tidak lagi tersimpan sebagai field terpisah di
// Supabase (payload.trades cuma punya confidence_score/bandar_signal numerik/
// teks polos) - tapi raw_text tiap sinyal masih menyimpan teks asli bot lengkap
// dengan emoji-nya. Extract dari sana, regex sama persis dengan lib/parser.js V1. ---
function extractConfidenceEmoji(rawText) {
  if (!rawText) return '';
  const m = rawText.match(/Confidence Score:\s*(\S+)\s*\d+\/10/);
  return m ? m[1] : '';
}
function extractBandarEmoji(rawText) {
  if (!rawText) return '';
  const m = rawText.match(/Sinyal Bandar:\s*(\S+)\s*\w+/);
  return m ? m[1] : '';
}

function renderCard(signal) {
  const detail = signal.detail || {};
  const barColor = bandarColor(detail.bandarmology);
  const halalBadge = signal.is_halal
    ? '<span class="badge-halal">HALAL</span>'
    : '<span class="badge-nonhalal">NON-HALAL</span>';

  const confidenceEmoji = extractConfidenceEmoji(signal.raw_text);
  const confidenceText = signal.confidence_score != null
    ? `${confidenceEmoji ? confidenceEmoji + ' ' : ''}${signal.confidence_score}/10 · ${signal.confidence_label || ''}`
    : 'belum ada skor';

  const bandarmology = detail.bandarmology;
  const bandarEmoji = extractBandarEmoji(signal.raw_text);
  const bandarText = bandarmology?.status
    ? bandarmology.status
    : bandarmology?.sinyalBandar
    ? `${bandarEmoji ? bandarEmoji + ' ' : ''}${bandarmology.sinyalBandar.label} · net ${bandarmology.smartMoneyNet || '-'} lot`
    : 'data bandarmology tidak tersedia';

  const detailId = `detail-${signal.id}`;

  const technicalRows = detail.technical
    ? Object.entries(detail.technical)
        .map(([key, val]) => {
          if (!val) return '';
          if (key === 'bb') return `<div><dt>BB</dt> Rp${val.lower?.toLocaleString('id-ID')} - Rp${val.upper?.toLocaleString('id-ID')}</div>`;
          if (key === 'atr') return `<div><dt>ATR</dt> Rp${val?.toLocaleString('id-ID')}</div>`;
          if (typeof val === 'object') {
            const parts = Object.entries(val)
              .filter(([k]) => k !== 'emoji')
              .map(([k, v]) => `${k}: ${v ?? '-'}`)
              .join(' · ');
            return `<div><dt>${key.toUpperCase()}</dt> ${parts}</div>`;
          }
          return '';
        })
        .join('')
    : '<div>Tidak ada data teknikal</div>';

  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--bar-color', barColor);
  card.innerHTML = `
    <div class="card__head">
      <div class="card__ticker">
        <a href="https://stockbit.com/symbol/${signal.ticker}/chartbit" target="_blank" rel="noopener noreferrer" class="card__ticker-link">${signal.ticker}</a>
        ${halalBadge}
      </div>
      <div class="card__meta">
        <div class="card__confidence">${confidenceText}</div>
        <div class="card__timestamp">${formatTimestamp(signal.signal_timestamp)}</div>
      </div>
    </div>
    <div class="card__prices">
      <div class="price-block">
        <div class="price-block__label">Entry</div>
        <div class="price-block__value">${formatRupiah(signal.entry_price)}</div>
      </div>
      <div class="price-block">
        <div class="price-block__label">TP1</div>
        <div class="price-block__value">${formatRupiah(signal.tp1_price)}</div>
        <div class="price-block__pct ${pctClass(signal.tp1_pct)}">${signal.tp1_pct || '-'}</div>
      </div>
      <div class="price-block">
        <div class="price-block__label">SL Default</div>
        <div class="price-block__value">${formatRupiah(signal.sl_default_price)}</div>
        <div class="price-block__pct ${pctClass(signal.sl_default_pct)}">${signal.sl_default_pct || '-'}</div>
      </div>
    </div>
    <div class="card__bandar">
      <span>${bandarText}</span>
      <button class="card__toggle" data-target="${detailId}">Detail</button>
    </div>
    <dl class="card__detail" id="${detailId}" hidden>
      ${detail.marketWarning ? `<div><dt>⚠️ Warning</dt> ${detail.marketWarning}</div>` : ''}
      ${signal.tp2_price ? `<div><dt>TP2 (Fibo 61.8%)</dt> ${formatRupiah(signal.tp2_price)}</div>` : ''}
      ${technicalRows}
      ${detail.pattern ? `<div><dt>Chart</dt> ${detail.pattern.chart || '-'}</div><div><dt>Candle</dt> ${detail.pattern.candle || '-'}</div>` : ''}
      ${detail.foreignFlow ? `<div><dt>Foreign Flow</dt> ${detail.foreignFlow.status} · Net ${detail.foreignFlow.netAsing || '-'} · Partisipasi ${detail.foreignFlow.partisipasiPct ?? '-'}%</div>` : ''}
      ${detail.confidenceReasons?.length ? `<div><dt>Alasan Skor</dt> ${detail.confidenceReasons.map((r) => r.reason).join(', ')}</div>` : ''}
      ${detail.analystOpinion ? `<div><dt>Analisis</dt> ${detail.analystOpinion}</div>` : ''}
      ${detail.news?.length ? `<div><dt>Berita</dt> ${detail.news.join(' · ')}</div>` : ''}
    </dl>
  `;
  card.querySelector('.card__toggle').addEventListener('click', (e) => {
    const target = document.getElementById(e.target.dataset.target);
    target.hidden = !target.hidden;
    e.target.textContent = target.hidden ? 'Detail' : 'Tutup';
  });
  return card;
}

function renderSignals() {
  const filtered = currentSignals.filter((s) => {
    if (currentFilter === 'halal') return s.is_halal;
    if (currentFilter === 'non-halal') return !s.is_halal;
    return true;
  });

  // Jaga-jaga: kalau data sumber berubah (filter ganti, refresh, dst) dan visibleCount
  // lama sudah lebih besar dari total yang sekarang tersedia, clamp biar nggak "nyangkut".
  if (visibleCount > filtered.length) visibleCount = Math.max(PAGE_SIZE, filtered.length);

  const visible = filtered.slice(0, visibleCount);

  els.signalsGrid.innerHTML = '';
  visible.forEach((s) => els.signalsGrid.appendChild(renderCard(s)));

  // Pesan jujur: kalau total sinyal yang ke-load dari Supabase sudah mentok di
  // QUERY_LIMIT, kasih tau eksplisit ini bukan "semua sinyal", tapi N terbaru saja.
  let countText = `${filtered.length} sinyal`;
  if (currentSignals.length >= QUERY_LIMIT) {
    countText += ` (${QUERY_LIMIT} sinyal terbaru dimuat, histori lebih lama tidak ditampilkan)`;
  }
  if (issiListEmpty && currentSignals.length > 0) {
    countText += ' — ⚠️ daftar ISSI belum diisi, semua status default NON-HALAL';
  }
  els.signalCount.textContent = countText;
  els.emptyState.hidden = filtered.length > 0;

  // Paginasi: kartu dibatasi per-batch (PAGE_SIZE), sisanya baru dirender
  // begitu tombol "Lebih banyak" dipencet, biar DOM nggak berat kalau sinyal ratusan.
  const hasMore = filtered.length > visible.length;
  els.paginationControls.hidden = !hasMore;
  els.paginationInfo.textContent = hasMore
    ? `Menampilkan ${visible.length} dari ${filtered.length}`
    : '';
}

// Sync dari Web Signal (trades_data) dulu, baru load & render. Ini yang bikin
// data selalu ikut yang terbaru tanpa perlu tombol "Import" manual, dan aman
// dipanggil berkali-kali (upsert idempotent by msg_id).
//
// PENTING (cache): sebelum full-sync, cek dulu trades_data.updated_at di cloud
// (query kecil, cuma 1 kolom) - kalau sama/lebih lama dari yang tercatat waktu
// cache lokal terakhir disimpan, berarti nggak ada perubahan sejak terakhir kali
// app ini sync, jadi SKIP upsert ke signals/confirmations/market_regime dan SKIP
// listSignals() (query besar), langsung pakai cache lokal. forceFull=true
// (dipakai tombol Refresh & simpan ISSI) melewati pengecekan ini.
async function syncAndLoad({ forceFull = false } = {}) {
  const session = await getSession();
  if (!session) return;
  const userId = session.user.id;

  // Render cache lokal dulu (instan) kalau ada, biar grid nggak kosong nunggu network.
  const cached = await loadSignalsFromDB();
  if (cached && cached.signals && cached.signals.length) {
    currentSignals = cached.signals;
    renderSignals();
  }

  els.syncStatus.textContent = 'Mengecek data terbaru...';
  try {
    const { data: meta, error: metaErr } = await sb
      .from('trades_data')
      .select('updated_at')
      .eq('user_id', userId)
      .maybeSingle();
    if (metaErr) throw metaErr;

    const cloudUpdatedAt = meta ? meta.updated_at : null;
    const isFresh = !forceFull && cached && cached.sourceUpdatedAt && cloudUpdatedAt
      && new Date(cloudUpdatedAt).getTime() <= new Date(cached.sourceUpdatedAt).getTime();

    if (isFresh) {
      const c = cached.counts || {};
      const n = c.signals != null ? c.signals : cached.signals.length;
      const confirmText = c.confirmations != null ? `, ${c.confirmations} konfirmasi` : '';
      const regimeText = c.regimes != null ? `, ${c.regimes} regime` : '';
      els.syncStatus.textContent = `Tersinkron: ${n} sinyal${confirmText}${regimeText} (cache lokal, sumber per ${formatTimestamp(cloudUpdatedAt)}).`;
      return;
    }

    els.syncStatus.textContent = 'Menyinkronkan dari Web Signal...';
    const summary = await syncFromWebSignal();
    if (summary.skipped) {
      els.syncStatus.textContent = 'Belum ada data di Web Signal untuk akun ini.';
    } else {
      els.syncStatus.textContent = `Tersinkron: ${summary.signals} sinyal, ${summary.confirmations} konfirmasi, ${summary.regimes} regime.`;
    }
    currentSignals = await listSignals(QUERY_LIMIT);
    renderSignals();
    await saveSignalsToDB(currentSignals, cloudUpdatedAt, {
      signals: summary.signals,
      confirmations: summary.confirmations,
      regimes: summary.regimes,
    });
  } catch (err) {
    els.syncStatus.textContent = `Gagal sync: ${err.message}`;
  }
}

els.btnRefresh.addEventListener('click', () => syncAndLoad({ forceFull: true }));
els.filterHalal.addEventListener('click', (e) => {
  if (!e.target.dataset.filter) return;
  currentFilter = e.target.dataset.filter;
  visibleCount = PAGE_SIZE; // balik ke halaman pertama tiap ganti filter
  [...els.filterHalal.children].forEach((c) => c.classList.remove('filter-chip--active'));
  e.target.classList.add('filter-chip--active');
  renderSignals();
});
els.btnLoadMore.addEventListener('click', () => {
  visibleCount += PAGE_SIZE;
  renderSignals();
});


  </script>
</body>
